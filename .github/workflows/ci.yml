name: Flux Run & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py && echo "OK"

      - name: Import check
        run: python -c "from app import app; print('OK')"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Start server
        run: python app.py &

      - name: Wait for server
        run: |
          set +e
          for i in $(seq 1 20); do
            sleep 1
            curl -sf http://localhost:5000/ > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            echo "Waiting... ($i)"
          done
          echo "Server did not start in time"
          exit 1

      - name: GET / → 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: POST empty URL → 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":""}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: POST localhost → 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":"http://localhost"}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: POST invalid URL → 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":"not-a-url"}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ]

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check Dockerfile exists
        id: check
        run: |
          [ -f Dockerfile ] && echo "exists=true" >> $GITHUB_OUTPUT \
                            || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Build image
        if: steps.check.outputs.exists == 'true'
        run: docker build -t flux-app:${{ github.sha }} .

      - name: Smoke-test container
        if: steps.check.outputs.exists == 'true'
        run: |
          docker run -d -p 5000:5000 --name flux flux-app:${{ github.sha }}
          sleep 4
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          docker stop flux
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]
