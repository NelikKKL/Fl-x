name: Flux Run & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py && echo "app.py OK"

      - name: Check imports
        run: python -c "from app import app; print('imports OK')"

  # ──────────────────────────────────────────────
  # 2. HTTP tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start server
        run: |
          python app.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # ждём пока сервер примет и GET и POST
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:5000/api/copy \
              -H "Content-Type: application/json" \
              -d '{"url":""}')
            if [ "$CODE" = "400" ]; then
              echo "Server ready (POST returned 400 as expected)"
              break
            fi
            echo "Waiting... ($i) got: $CODE"
            sleep 1
          done

      - name: GET / returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: POST /api/copy rejects empty URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":""}')
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: POST /api/copy rejects localhost
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":"http://localhost"}')
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: POST /api/copy rejects invalid URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/copy \
            -H "Content-Type: application/json" \
            -d '{"url":"not-a-url"}')
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true

  # ──────────────────────────────────────────────
  # 3. Docker build
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dockerfile not found, skipping"
          fi

      - name: Build image
        if: steps.check.outputs.exists == 'true'
        run: docker build -t flux-app:${{ github.sha }} .

      - name: Smoke-test container
        if: steps.check.outputs.exists == 'true'
        run: |
          docker run -d -p 5000:5000 --name flux flux-app:${{ github.sha }}
          sleep 4
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          docker stop flux
          echo "Container status: $STATUS"
          [ "$STATUS" = "200" ]
