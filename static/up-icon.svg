<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" width="520" height="460">
  <defs>
    <!-- subtle noise filter for tape texture -->
    <filter id="tape-rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- slight blur for tape translucency -->
    <filter id="soft" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="520" height="460" fill="#080808"/>

  <!-- ══════════════════════════════════
       F  (top-left, tilted -5°)
  ══════════════════════════════════ -->
  <g transform="rotate(-5, 82, 220)" filter="url(#tape-rough)">
    <!-- vertical spine -->
    <rect x="50" y="78" width="36" height="250" rx="7" fill="#898989"/>
    <!-- top bar -->
    <rect x="50" y="78" width="118" height="35" rx="7" fill="#909090"/>
    <!-- mid bar -->
    <rect x="50" y="178" width="88" height="30" rx="6" fill="#898989"/>
    <!-- sheen stripe on vertical -->
    <rect x="56" y="84" width="14" height="238" rx="4" fill="rgba(255,255,255,0.07)"/>
    <!-- sheen on top bar -->
    <rect x="56" y="84" width="106" height="11" rx="3" fill="rgba(255,255,255,0.09)"/>
  </g>

  <!-- ══════════════════════════════════
       L  (tilted +3°)
  ══════════════════════════════════ -->
  <g transform="rotate(3, 192, 225)" filter="url(#tape-rough)">
    <!-- vertical -->
    <rect x="163" y="80" width="34" height="248" rx="7" fill="#828282"/>
    <!-- bottom bar -->
    <rect x="163" y="293" width="106" height="35" rx="7" fill="#868686"/>
    <!-- sheen vertical -->
    <rect x="169" y="86" width="12" height="236" rx="4" fill="rgba(255,255,255,0.07)"/>
    <!-- sheen bottom -->
    <rect x="169" y="297" width="94" height="11" rx="3" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ══════════════════════════════════
       Ú  (tilted -2°, with accent)
  ══════════════════════════════════ -->
  <g transform="rotate(-2, 290, 230)" filter="url(#tape-rough)">
    <!-- left bar -->
    <rect x="254" y="82" width="33" height="190" rx="7" fill="#868686"/>
    <!-- right bar -->
    <rect x="340" y="82" width="33" height="190" rx="7" fill="#878787"/>
    <!-- bottom bridge (rounded) -->
    <rect x="254" y="240" width="119" height="36" rx="18" fill="#858585"/>
    <!-- sheen left bar -->
    <rect x="260" y="88" width="12" height="178" rx="4" fill="rgba(255,255,255,0.07)"/>
    <!-- sheen bottom -->
    <rect x="260" y="246" width="106" height="11" rx="5" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ú accent pill — white, rotated like handwritten acute -->
  <rect x="347" y="52" width="46" height="17" rx="8.5"
        fill="#efefef" opacity="0.93"
        transform="rotate(-20, 370, 60)"/>

  <!-- ══════════════════════════════════
       X  (tilted +4°, contained safely)
  ══════════════════════════════════ -->
  <g transform="rotate(4, 435, 222)">
    <!-- stroke ╲ -->
    <rect x="405" y="72" width="34" height="265" rx="8" fill="#7e7e7e" opacity="0.91"
          transform="rotate(30, 435, 210)" filter="url(#tape-rough)"/>
    <!-- stroke ╱ -->
    <rect x="405" y="72" width="34" height="265" rx="8" fill="#898989" opacity="0.89"
          transform="rotate(-30, 435, 210)" filter="url(#tape-rough)"/>

    <!-- crossing diamond highlight (where tape overlaps) -->
    <rect x="420" y="195" width="30" height="30" rx="5"
          fill="rgba(230,230,230,0.2)"
          transform="rotate(45, 435, 210)"/>

    <!-- sheen on ╲ stroke -->
    <rect x="412" y="72" width="12" height="265" rx="4" fill="rgba(255,255,255,0.06)"
          transform="rotate(30, 435, 210)"/>
    <!-- sheen on ╱ stroke -->
    <rect x="412" y="72" width="12" height="265" rx="4" fill="rgba(255,255,255,0.05)"
          transform="rotate(-30, 435, 210)"/>
  </g>

</svg>
